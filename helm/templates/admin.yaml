# ConfigMap {
apiVersion: v1
kind: ConfigMap
metadata: # {
  name:   ayia-admin  #&service_cm_name ayia-admin
  labels:
    app:      ayia-admin
    release:  ayia
# } ConfigMap.metadata
data: # {
  config.yaml: |
    verbosity:  0

    web_admin: # {
      port:   {{ .Values.web_admin.port.private }}
    # } web_admin

    mongodb: # {
      # Using ./etc/mongo-proxy, host == localhost
      proto:      env:MONGO_PROTO
      host:       env:MONGO_HOST
      port:       env:MONGO_PORT
      database:   env:MONGO_DATABASE
      user:       env:MONGO_USER
      password:   env:MONGO_PASS
      authSource: env:MONGO_AUTH_SOURCE

      # A map between internal collection names and theh collection within
      # `monbodb.database`.
      collection_map: # {
        versions: versions
        users:    users
      #} mongodb.collection_map
    #} mongodb
# } ConfigMap.data
# } ConfigMap
---
# Service {
apiVersion: v1
kind: Service
metadata: # {
  name: ayia-admin  #&service_name ayia-admin
  labels:
    app:      ayia-admin
    release:  ayia
# } Service.metadata
spec: # {
  selector: # {
    app:      ayia-admin
    release:  ayia
  # } Service.spec.selector
  ports: # {
    - name:       ayia-admin
      protocol:   TCP
      port:       {{ .Values.web_admin.port.public }}
      targetPort: ayia-admin
  # } Service.spec.ports
# } Service.spec
# } Service
---
# VolumeClaim {
{{- $storageClass := .Values.web_admin.persistence.storageClass }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata: #{
  name: ayia-admin-cache
  labels:
    app:      ayia-admin
    release:  ayia
#} VolumeClaim.metadata
spec: #{
  accessModes:
  {{- range .Values.web_admin.persistence.accessModes }}
    - {{ . | quote }}
  {{- end }}
  resources: #{
    requests: #{
      storage: {{ .Values.web_admin.persistence.size | quote }}
    # } Deployment.spec.volumeClaimTemplate[0].spec.resources.requests
  # } Deployment.spec.volumeClaimTemplate[0].spec.resources
  {{- if not (eq "-" $storageClass) }}
  {{   printf "storageClassName: %s" $storageClass -}}
  {{  end }}
# } VolumeClaim.spec
# } VolumeClaim
---
{{- $mongoSecret  := .Values.mongodb.auth.existingSecret -}}
{{- $mongoPort    := .Values.mongodb.containerPorts.mongodb -}} 
# Deployment {
apiVersion: apps/v1
kind: Deployment
metadata: # {
  name: ayia-admin
  labels:
    app:      ayia-admin
    release:  ayia
# } Deployment.metadata
spec: # {
  selector:
    matchLabels:
      app:      ayia-admin
      release:  ayia
  strategy:
    type: Recreate  # Since we have a persistent volume
  template: # {
    metadata: # {
      labels: # {
        app:      ayia-admin
        release:  ayia
      # } Deployment.spec.template.metadata.labels
    # } Deployment.spec.template.metadata
    spec: # {
      imagePullSecrets:
        - name: {{ .Values.global.pullSecret }}
      securityContext: #{
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: "RuntimeDefault"
      # } securityContext


      containers: # {
        - name: server # {
          image:  registry.nibious.com/ayia/web-admin:{{ .Values.web_admin.image.tag }}
          imagePullPolicy: {{ .Values.web_admin.image.pullPolicy |
                                default "IfNotPresent" }}

          env: #{
            - name:   MONGO_PROTO
              value:  mongodb
            - name:   MONGO_HOST
              value:  mongodb
            - name:   MONGO_PORT
              value:  {{ $mongoPort | quote }}
            - name:   MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $mongoSecret }}
                  key:  user
            - name:   MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ $mongoSecret }}
                  key:  password
            - name:   MONGO_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ $mongoSecret }}
                  key:  database
            - name:   MONGO_AUTH_SOURCE
              valueFrom:
                secretKeyRef:
                  name: {{ $mongoSecret }}
                  key:  authSource
          # } Deployment.spec.template.spec.containers[server].env

          securityContext: #{
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          # } Deployment.spec.template.spec.containers[server].securityContext



          volumeMounts: # {
            - name:       config
              mountPath:  /app/etc/config.yaml
              subPath:    config.yaml
              readOnly:   true
            - name:       cache
              mountPath:  /app/cache
          # } Deployment.spec.template.spec.containers[server].volumeMounts

          ports: #{
            - name:           ayia-admin
              containerPort:  {{ .Values.web_admin.port.private }}
          # } Deployment.spec.template.spec.containers[server].ports

          livenessProbe: # {
            httpGet:
              path: /healthcheck
              port: {{ .Values.web_admin.port.private }}
            initialDelaySeconds:  3
            periodSeconds:        3
          # } Deployment.spec.template.spec.containers[server].livenessProbe

        # } Deployment.spec.template.spec.containers[server]
      # } Deployment.spec.template.spec.containers

      volumes: # {
        - name: config
          configMap:
            name:   ayia-admin  #*service_cm_name
        - name: cache
          persistentVolumeClaim:
            claimName: ayia-admin-cache
      # } Deployment.spec.template.spec.volumes
    # } Deployment.spec.template.spec
  # } Deployment.spec.template
# } Deployment.spec
# } Deployment
---
# HTTPRoute {
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ayia-admin
spec:
  parentRefs:
  - name: contour
    namespace: projectcontour
  hostnames:
  {{- range .Values.web_admin.ingress.hosts }}
    - {{ . | quote }}
  {{- end }}
  rules:
  - backendRefs:
    - name: ayia-admin
      port: {{ .Values.web_admin.port.public }}
# } HTTPRoute
---
